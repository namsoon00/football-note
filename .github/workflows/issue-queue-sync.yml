name: Issue Queue Sync

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync issue queue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/sync_issue_queue.py

      - name: Commit queue update
        run: |
          if git diff --quiet docs/ISSUE_QUEUE.md; then
            echo "No queue changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ISSUE_QUEUE.md
          git commit -m "chore: sync issue queue (#0)"
          git push
