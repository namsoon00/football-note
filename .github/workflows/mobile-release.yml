name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android:
    name: Android Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'android' || inputs.target == 'both' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Prepare Android signing files
        env:
          ANDROID_UPLOAD_KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_UPLOAD_KEYSTORE_B64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_UPLOAD_KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --build-name "${GITHUB_REF_NAME#v}"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Upload to Google Play
        env:
          PLAY_JSON_KEY: ${{ secrets.PLAY_JSON_KEY }}
          ANDROID_AAB_PATH: build/app/outputs/bundle/release/app-release.aab
        run: |
          test -n "$PLAY_JSON_KEY"
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.channel }}" == "production" ]]; then
            bundle exec fastlane android production
          else
            bundle exec fastlane android internal
          fi

  ios:
    name: iOS Release
    runs-on: macos-14
    if: ${{ github.event_name == 'push' || inputs.target == 'ios' || inputs.target == 'both' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install iOS signing assets
        env:
          IOS_DISTRIBUTION_CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERT_B64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$IOS_DISTRIBUTION_CERT_B64"
          test -n "$IOS_DISTRIBUTION_CERT_PASSWORD"
          test -n "$IOS_PROVISIONING_PROFILE_B64"
          test -n "$KEYCHAIN_PASSWORD"
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$IOS_DISTRIBUTION_CERT_B64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_B64" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DISTRIBUTION_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-method app-store \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --build-name "${GITHUB_REF_NAME#v}"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          IOS_IPA_PATH: build/ios/ipa/*.ipa
        run: |
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_KEY_CONTENT"
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          test -n "$IPA_PATH"
          export IOS_IPA_PATH="$IPA_PATH"
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.channel }}" == "production" ]]; then
            bundle exec fastlane ios appstore
          else
            bundle exec fastlane ios testflight
          fi
