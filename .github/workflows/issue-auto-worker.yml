name: Issue Auto Worker (Local Codex)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional issue number to run directly"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  discussions: write

concurrency:
  group: issue-auto-worker
  cancel-in-progress: false

jobs:
  run-local-codex:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check local Python
        run: |
          python3 --version

      - name: Run issue worker
        id: run_issue_worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: main
          WORKFLOW_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          ISSUE_WORKER_RESULT_FILE: ${{ github.workspace }}/.tmp/issue_worker_result.json
          # Optional overrides (Repository Variables/Secrets)
          CODEX_RUNNER_CMD: ${{ vars.CODEX_RUNNER_CMD }}
          USE_CUSTOM_CODEX_CMD: ${{ vars.USE_CUSTOM_CODEX_CMD }}
          CODEX_SANDBOX: ${{ vars.CODEX_SANDBOX }}
          CODEX_APPROVAL: ${{ vars.CODEX_APPROVAL }}
          CODEX_UNSAFE: ${{ vars.CODEX_UNSAFE }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          FORCE_MAIN_MERGE: "1"
          LOCAL_SYNC_REPO_PATH: ${{ vars.LOCAL_SYNC_REPO_PATH }}
          RUN_VERIFY: ${{ vars.RUN_VERIFY }}
          AUTO_MERGE: ${{ vars.AUTO_MERGE }}
          AUTO_MERGE_METHOD: ${{ vars.AUTO_MERGE_METHOD }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          rm -f "$ISSUE_WORKER_RESULT_FILE"
          bash scripts/run_issue_worker.sh

      - name: Post issue workflow result
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_WORKER_RESULT_FILE: ${{ github.workspace }}/.tmp/issue_worker_result.json
          ISSUE_WORKER_WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash scripts/post_issue_worker_result.sh

      - name: Fail workflow if worker failed
        if: always() && steps.run_issue_worker.outcome == 'failure'
        run: exit 1
