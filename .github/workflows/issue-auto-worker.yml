name: Issue Auto Worker (Local Codex)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-auto-worker
  cancel-in-progress: false

jobs:
  run-local-codex:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check local Python
        run: |
          python3 --version

      - name: Run issue worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: main
          # Optional overrides (Repository Variables/Secrets)
          CODEX_RUNNER_CMD: ${{ vars.CODEX_RUNNER_CMD }}
          USE_CUSTOM_CODEX_CMD: ${{ vars.USE_CUSTOM_CODEX_CMD }}
          CODEX_SANDBOX: ${{ vars.CODEX_SANDBOX }}
          CODEX_APPROVAL: ${{ vars.CODEX_APPROVAL }}
          CODEX_UNSAFE: ${{ vars.CODEX_UNSAFE }}
          FORCE_MAIN_MERGE: ${{ vars.FORCE_MAIN_MERGE }}
          RUN_VERIFY: ${{ vars.RUN_VERIFY }}
          AUTO_MERGE: ${{ vars.AUTO_MERGE }}
          AUTO_MERGE_METHOD: ${{ vars.AUTO_MERGE_METHOD }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          bash scripts/run_issue_worker.sh
