<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1C2E"/>
      <stop offset="0.55" stop-color="#14395B"/>
      <stop offset="1" stop-color="#1E4B6A"/>
    </linearGradient>
    <linearGradient id="lights" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#C7E7FF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="turf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E7B4F"/>
      <stop offset="1" stop-color="#0F5D3A"/>
    </linearGradient>
    <linearGradient id="turfStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1F8252"/>
      <stop offset="1" stop-color="#1A7048"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#sky)"/>

  <!-- Stadium lights -->
  <rect x="60" y="120" width="220" height="18" rx="9" fill="url(#lights)"/>
  <rect x="800" y="120" width="220" height="18" rx="9" fill="url(#lights)"/>
  <rect x="380" y="160" width="320" height="14" rx="7" fill="url(#lights)" opacity="0.7"/>

  <!-- Upper stands -->
  <path d="M0 420 C220 360 860 360 1080 420 L1080 620 C860 560 220 560 0 620 Z" fill="#0F2740"/>
  <path d="M0 460 C220 405 860 405 1080 460 L1080 520 C860 475 220 475 0 520 Z" fill="#1B3C5C" opacity="0.9"/>
  <path d="M0 520 C220 485 860 485 1080 520 L1080 580 C860 545 220 545 0 580 Z" fill="#214C73" opacity="0.85"/>

  <!-- Crowd dots -->
  <g opacity="0.55">
    <circle cx="140" cy="500" r="4" fill="#FFB347"/>
    <circle cx="210" cy="515" r="4" fill="#7FDBFF"/>
    <circle cx="300" cy="505" r="4" fill="#FFD6A5"/>
    <circle cx="420" cy="520" r="4" fill="#F07167"/>
    <circle cx="520" cy="505" r="4" fill="#8DD3C7"/>
    <circle cx="650" cy="520" r="4" fill="#C7F9CC"/>
    <circle cx="760" cy="505" r="4" fill="#FFADAD"/>
    <circle cx="880" cy="515" r="4" fill="#BDB2FF"/>
    <circle cx="980" cy="500" r="4" fill="#FFD166"/>
  </g>

  <!-- Lower stands -->
  <path d="M0 620 C240 580 840 580 1080 620 L1080 780 C840 740 240 740 0 780 Z" fill="#112B46"/>

  <!-- Pitch -->
  <rect y="780" width="1080" height="1140" fill="url(#turf)"/>
  <rect y="820" width="1080" height="90" fill="url(#turfStripe)"/>
  <rect y="1000" width="1080" height="90" fill="url(#turfStripe)"/>
  <rect y="1180" width="1080" height="90" fill="url(#turfStripe)"/>
  <rect y="1360" width="1080" height="90" fill="url(#turfStripe)"/>
  <rect y="1540" width="1080" height="90" fill="url(#turfStripe)"/>
  <rect y="1720" width="1080" height="90" fill="url(#turfStripe)"/>

  <!-- Pitch lines -->
  <rect x="90" y="860" width="900" height="960" rx="40" stroke="#EAF6FF" stroke-opacity="0.95" stroke-width="6"/>
  <line x1="540" y1="860" x2="540" y2="1820" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>
  <circle cx="540" cy="1340" r="140" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>
  <circle cx="540" cy="1340" r="12" fill="#EAF6FF"/>
  <rect x="90" y="1080" width="220" height="520" rx="24" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>
  <rect x="770" y="1080" width="220" height="520" rx="24" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>
  <rect x="140" y="1200" width="120" height="280" rx="16" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>
  <rect x="820" y="1200" width="120" height="280" rx="16" stroke="#EAF6FF" stroke-opacity="0.9" stroke-width="6"/>

  <!-- Goal posts -->
  <rect x="150" y="1280" width="14" height="180" fill="#EAF6FF"/>
  <rect x="236" y="1280" width="14" height="180" fill="#EAF6FF"/>
  <rect x="150" y="1280" width="100" height="10" fill="#EAF6FF"/>

  <rect x="916" y="1280" width="14" height="180" fill="#EAF6FF"/>
  <rect x="1002" y="1280" width="14" height="180" fill="#EAF6FF"/>
  <rect x="916" y="1280" width="100" height="10" fill="#EAF6FF"/>

  <!-- Perspective shadow -->
  <ellipse cx="540" cy="1760" rx="360" ry="60" fill="#0B1C2E" opacity="0.25"/>
</svg>
